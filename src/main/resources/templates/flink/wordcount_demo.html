<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Flink DataStream WordCount 演示</title>
    <style>
        body { background: linear-gradient(120deg, #f1faff 60%, #87d0e8 100%); font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; }
        .container { max-width: 720px; margin: 50px auto; background: #fff; border-radius: 16px; box-shadow: 0 6px 28px rgba(13,108,148,0.15); padding: 32px 36px;}
        h2 { color: #0d6c94; text-align: center; letter-spacing: 2px; margin-bottom: 22px;}
        textarea { width: 100%; min-height: 120px; padding: 10px; border: 1px solid #aedaeb; border-radius: 8px; font-size: 14px; box-sizing: border-box;}
        .btn { padding: 10px 26px; background: #0d6c94; color: #fff; border: none; border-radius: 22px; font-size: 1.05rem; cursor: pointer; margin-right: 10px;}
        .btn:hover { background: #095072;}
        .meta { background: #e7f6fb; padding: 10px 16px; border-radius: 8px; margin-top: 16px; color: #095072; font-size: 14px;}
        table { width: 100%; border-collapse: collapse; margin-top: 14px; background: #f5fbfd; border-radius: 8px; overflow: hidden;}
        th, td { padding: 8px 10px; border-bottom: 1px solid #d1ecf3; text-align: center;}
        th { background: #aedaeb; color: #084d6b;}
        a.back { color: #0d6c94; text-decoration: none; margin-left: 12px;}
    </style>
</head>
<body>
<div class="container">
    <h2>Flink DataStream WordCount 演示</h2>
    <p style="color:#0a4761;">用 mini-cluster 跑一次有界流 WordCount：<code>flatMap → keyBy → sum</code>。这就是 Flink 状态算子最简单的形态。</p>
    <textarea id="text">hello flink
hello kafka
flink is real time
spark and flink</textarea>
    <div style="margin-top:14px;">
        <button class="btn" id="runBtn">跑一下</button>
        <a class="back" href="/">← 返回首页</a>
    </div>
    <div class="meta" id="meta" style="display:none;"></div>
    <table id="resultTable" style="display:none;">
        <thead><tr><th>单词</th><th>计数</th></tr></thead>
        <tbody id="tbody"></tbody>
    </table>
</div>
<script>
document.getElementById('runBtn').onclick = function() {
    const text = document.getElementById('text').value;
    fetch('/flink/wordcount/run', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: 'text=' + encodeURIComponent(text)
    }).then(r => r.json()).then(data => {
        document.getElementById('meta').style.display = 'block';
        document.getElementById('meta').innerText = `用时 ${data.elapsedMs} ms · 唯一单词 ${data.uniqueWords} 个`;
        const tbody = document.getElementById('tbody');
        tbody.innerHTML = '';
        Object.entries(data.counts).sort((a,b) => b[1]-a[1]).forEach(([w,c]) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${w}</td><td>${c}</td>`;
            tbody.appendChild(tr);
        });
        document.getElementById('resultTable').style.display = 'table';
    });
};
</script>
</body>
</html>
